services:
  backend:
    build:
      context: .
      dockerfile: web-demo/backend/Dockerfile
    container_name: zhs-backend
    restart: unless-stopped
    init: true
    volumes:
      - ./web-demo/backend/runtime:/app/web-demo/backend/runtime
      - ./logs:/app/logs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./web-demo
      dockerfile: Dockerfile
      args:
        VITE_USE_MOCK: "false"
        VITE_API_BASE_URL: ""
    container_name: zhs-web
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    init: true
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
